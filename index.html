<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div class="container">
      <form>
        <div class="mb-3">
          <label for="petName" class="form-label">Name</label>
          <input
            type="text"
            class="form-control"
            id="petName"
            aria-describedby="emailHelp"
          />

          <label for="type" class="form-label">Type</label>
          <input type="text" class="form-control" id="type" />

          <label for="color" class="form-label">Color</label>
          <input
            type="text"
            class="form-control"
            id="color"
            aria-describedby="emailHelp"
          />

          <label for="specialSkill" class="form-label">Special Skill</label>
          <input
            type="text"
            class="form-control"
            id="specialSkill"
            aria-describedby="emailHelp"
          />

          <label for="imageUrl" class="form-label">Image</label>
          <input type="url" class="form-control" id="imageUrl" />

          <button id="sub" type="submit" class="btn btn-warning">Submit</button>
        </div>
      </form>
    </div>
    <div class="buttonbox">
      <button type="button" id="cats" class="btn btn-primary">Cat</button>
      <button type="button" id="dog" class="btn btn-primary">Dog</button>
      <button type="button" id="dino" class="btn btn-primary">Dino</button>
      <button type="button" id="show-all" class="btn btn-primary">
        Show All
      </button>
    </div>
    <div id="app"></div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
    <div class="box">
      <script src="main.js"></script>
    </div>
  </body>
</html>
